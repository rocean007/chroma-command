<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CHROMA COMMAND: THE LIVING PROTOCOL — Asymmetrical Web3 Strategy Game" />
    <!-- FIX: referrer leakage to third parties; cheap hardening -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!--
      FIX (CSP): 'unsafe-inline' weakens XSS defenses; Vite dev HMR often needs it.
      Production: serve CSP with nonces via server/template, remove unsafe-inline, and widen connect-src to your API host (not only localhost).
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:3001 ws://localhost:3001 wss://localhost:3001; img-src 'self' data: blob:; worker-src blob:; base-uri 'none'; frame-ancestors 'none';" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <title>CHROMA COMMAND: THE LIVING PROTOCOL</title>
    <!-- Consent flicker reduction: if valid consent JSON exists, hide banner hint until React hydrates -->
    <script>
      (function(){
        try {
          var r = localStorage.getItem('chroma_consent_v1');
          if (r) {
            var j = JSON.parse(r);
            if (j && j.version === 1 && j.expiresAt && new Date(j.expiresAt) > new Date())
              document.documentElement.dataset.chromaConsent = '1';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
